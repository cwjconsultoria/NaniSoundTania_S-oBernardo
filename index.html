<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>São Bernardo – 6x1</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 600px;
            height: 100px;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .widget {
            width: 600px;
            height: 100px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a0000 0%, #080808 70%, #000 100%);
            overflow: hidden;
        }

        /* Starfield / space background */
        .stars {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(100,120,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 70%, rgba(150,170,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 40%, rgba(100,130,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 15%, rgba(120,150,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 80%, rgba(80,110,255,0.25) 0%, transparent 100%),
                radial-gradient(1px 1px at 20% 85%, rgba(100,130,255,0.2) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 70% 60%, rgba(150,180,255,0.2) 0%, transparent 100%);
        }

        /* Red glow behind text */
        .glow {
            position: absolute;
            width: 400px;
            height: 80px;
            background: radial-gradient(ellipse, rgba(180,0,0,0.25) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Corner brackets */
        .corner {
            position: absolute;
            width: 18px;
            height: 18px;
            border-color: #CC0000;
            border-style: solid;
            opacity: 0.85;
        }
        .tl { top: 6px; left: 6px;  border-width: 2px 0 0 2px; }
        .tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
        .bl { bottom: 6px; left: 6px;  border-width: 0 0 2px 2px; }
        .br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

        /* Vertical red bars */
        .bar { 
            position: absolute;
            top: 14px; bottom: 14px;
            width: 3px;
            background: linear-gradient(to bottom, transparent, #CC0000, transparent);
            border-radius: 2px;
            opacity: 0.8;
        }
        .bar-l { left: 22px; }
        .bar-r { right: 22px; }

        /* Text block */
        .text-block {
            position: relative;
            z-index: 10;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            letter-spacing: -0.01em;
        }

        .line-sao {
            font-size: 32px;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .line-bernardo {
            font-size: 42px;
            color: #FF1A1A;
            text-shadow: 0 0 25px rgba(220,0,0,0.6), 0 0 8px rgba(255,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="widget">
        <div class="stars"></div>
        <div class="glow"></div>

        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div class="bar bar-l"></div>
        <div class="bar bar-r"></div>

        <div class="text-block">
            <div class="line-sao">SÃO</div>
            <div class="line-bernardo">BERNARDO</div>
        </div>
    </div>
</body>
</html>
